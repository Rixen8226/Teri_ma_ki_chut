<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Information Page</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }
        .info-container {
            text-align: center;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        .telegram-logo {
            width: 60px;
            height: 60px;
        }
        .channel-link, .website-link {
            display: block;
            margin-top: 20px;
            font-size: 18px;
            color: #007bff;
            text-decoration: none;
        }
        .channel-link:hover, .website-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="info-container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" alt="Telegram Logo" class="telegram-logo">
        <h1>Official Channel: <br>@KingPatcher</h1>
        <a href="https://t.me/kingpatcher" target="_blank" class="channel-link">Visit our Telegram Channel</a>
        <a href="https://kingpatcher.com" target="_blank" class="website-link">Visit our Official Website</a>
        <a href="https://kingpatcher.com/hacks.html" target="_blank" class="website-link">Visit our Store</a>
    </div>
</body>
</html>

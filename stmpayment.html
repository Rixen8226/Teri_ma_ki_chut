<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f2f2f2;
        }
        .payment-container {
            max-width: 400px;
            padding: 20px;
            background: #fff;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-radius: 8px;
        }
        .payment-container h2 {
            text-align: center;
            color: #333;
        }
        label {
            font-size: 14px;
            color: #333;
            margin-bottom: 5px;
            display: block;
        }
        input[type="file"],
        input[type="text"],
        input[type="email"],
        button {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        .qr-code {
            text-align: center;
            margin: 20px 0;
        }
        .qr-code img {
            width: 150px;
            border-radius: 5px;
            height: 150px;
        }
        button {
            background-color: #4CAF50;
            color: #fff;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        /* Popup Styles */
        .popup {
            display: none;
            position: fixed;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
        }
        .popup-content {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        .close-popup {
            background-color: #4CAF50;
            color: #fff;
            border: none;
            cursor: pointer;
            padding: 10px 20px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="payment-container">
        <h2>Payment Page (₹1,999.00)</h2>

        <form id="paymentForm" action="/hacks.html" method="POST" enctype="multipart/form-data" onsubmit="return showPopup()">
            <!-- QR Code -->
            <div class="qr-code">
                <label>Scan QR to Pay</label>
                <img src="qr.jpg" alt="QR Code">
                <h4>AbrarEntry@jio</h4>
                <h3>
  <a href="upi://pay?pa=abrarentry@jio&pn=KP&am=1999&cu=INR">Click here to make payment</a>
                </h3>
            </div>

            <!-- Upload Payment Screenshot -->
            <label for="screenshot">Upload Payment Screenshot</label>
            <input type="file" id="screenshot" name="screenshot" accept="image/*" required>

            <!-- Telegram ID or WhatsApp Number -->
            <label for="contact">Enter Telegram ID or WhatsApp Number</label>
            <input type="text" id="contact" name="contact" placeholder="Telegram ID or WhatsApp Number" required>

            <!-- Gmail Section -->
            <label for="gmail">Enter Your Gmail Address</label>
            <input type="email" id="gmail" name="gmail" placeholder="example@gmail.com" required>

            <!-- Submit Button -->
            <button type="submit">Submit Payment</button>
        </form>
    </div>

    <!-- Popup for Success Message -->
    <div class="popup" id="successPopup">
        <div class="popup-content">
            <h3>Request Sent Successfully!</h3>
            <h4>Wait 24 hours and check your mail box.</h4>
            <button class="close-popup" onclick="closePopup()">Close</button>
        </div>
    </div>

    <script>
        function showPopup() {
            // Prevent form submission for demo purposes
            event.preventDefault(); // Remove this line in production to allow form submission
            document.getElementById('successPopup').style.display = 'flex';
            return false; // Prevent form submission for demo
        }

        function closePopup() {
            document.getElementById('successPopup').style.display = 'none';
            document.getElementById('paymentForm').submit(); // Submit the form after closing the popup
        }
    </script>
</body>
</html>
